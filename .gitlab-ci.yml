stages:
  - build
  - deploy

default:
  image: node:20

build:
  stage: build
  script:
    - cd app
    - npm ci || npm install
    - npm run build
  artifacts:
    paths:
      - app/dist
    expire_in: 1 year
  only:
    - main

pages:
  stage: deploy
  script:
    - rm -rf public
    - mkdir -p public
    - cp -r app/dist/* public/
  artifacts:
    paths:
      - public
  only:
    - main
